<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança: Conta Vinculada - Codworks Moz</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .main { background-color: #1e293b; margin: 20px auto; width: 100%; max-width: 600px; border-radius: 24px; border: 1px solid #334155; overflow: hidden; }
        .header { padding: 40px; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .content { padding: 40px; text-align: center; }
        .title { font-size: 24px; font-weight: 700; color: #ffffff; margin-bottom: 20px; }
        .text { font-size: 16px; line-height: 26px; color: #94a3b8; margin-bottom: 30px; }
        .badge { background-color: #3b82f6; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; display: inline-block; margin-bottom: 20px; }
        .footer { padding: 30px; text-align: center; font-size: 12px; color: #64748b; }
        .accent { color: #3b82f6; }
    </style>
</head>
<body>
    <table class="main">
        <tr><td class="header"><div style="font-size: 24px; font-weight: 900; color: #ffffff;">Codworks <span class="accent">Moz</span></div></td></tr>
        <tr>
            <td class="content">
                <h1 class="title">Nova identidade vinculada 🔗</h1>
                <div class="badge">{{ .Data.provider }}</div>
                <p class="text">Acabaste de vincular a tua conta de <strong>{{ .Data.provider }}</strong> ao teu perfil na Codworks Moz.</p>
                <p class="text">Agora podes entrar na plataforma utilizando este provedor de forma rápida e segura.</p>
            </td>
        </tr>
        <tr><td class="footer">&copy; 2024 Codworks Moz. Maputo, Moçambique.</td></tr>
    </table>
</body>
</html>
